<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flying Lap Compare</title>
    <meta name="theme-color" content="#0b0b0d">
    <link rel="stylesheet" href="style.css?v=table-polish-1">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- External Libraries (self-hosted in ./vendor/ to avoid CDN/Cloudflare blocks) -->
    <script src="vendor/highcharts.js" defer></script>
    <script src="vendor/exporting.js" defer></script>
    <script src="vendor/offline-exporting.js" defer></script>
    <!-- Application Scripts -->
    <script src="utils.js" defer></script>
    <script src="QualifyingTrendGraph.js?v=table-polish-1" defer></script>
    <script src="history.js" defer></script>
    <script src="race.js" defer></script>
    <script src="main.js?v=table-polish-1" defer></script>
</head>
<body>
    <div class="app-frame">
        <header class="app-hero">
            <div class="hero-copy">
                <div class="hero-kicker">F1 TEAMMATE ANALYTICS</div>
                <h1>Flying Lap Compare</h1>
                <p>Qualifying / Race / Season Delta</p>
            </div>
            <div class="hero-telemetry" aria-hidden="true">
                <div class="telemetry-ring"></div>
                <div class="telemetry-card">
                    <span>DELTA</span>
                    <strong>0.000</strong>
                    <em>sec</em>
                </div>
                <div class="telemetry-bars">
                    <i></i><i></i><i></i><i></i><i></i>
                </div>
            </div>
        </header>

        <nav class="banner" aria-label="Comparison modes">
            <button class="tab-button active" type="button" data-tab="qualifying" onclick="switchTab('qualifying')">排位赛</button>
            <button class="tab-button" type="button" data-tab="race" onclick="switchTab('race')">正赛</button>
            <button class="tab-button" type="button" data-tab="history" onclick="switchTab('history')">队友历史</button>
            <button class="tab-button" type="button" data-tab="year" onclick="switchTab('year')">年份榜单</button>
        </nav>

        <main class="workspace">
    <section id="qualifying-content" class="view-panel active-panel">
        <div class="content-heading">
            <span class="section-label">MODE 01</span>
            <h2 class="flex-title">队友排位赛对比</h2>
        </div>
        <div class="flex-container-options">
            <select class="selector" id="seasonList" name="seasonList"></select>
            <select class="selector" id="constructorList" name="constructorList"></select>
            <button class="selector primary-action" id="go">分析</button>
        </div>
        <div class="flex-container-table" id="tables"></div>
    </section>
    
    <section id="history-content" class="view-panel" style="display: none;">
        <div class="content-heading">
            <span class="section-label">MODE 03</span>
            <h2 class="flex-title">队友历史对比</h2>
        </div>
        <div class="flex-container-options">
            <select class="selector" id="startYearList" name="startYearList"></select>
            <select class="selector" id="endYearList" name="endYearList"></select>
            <select class="selector" id="historyConstructorList" name="historyConstructorList"></select>
            <button class="selector primary-action" id="historyGo">分析</button>
        </div>
        <div class="flex-container-table" id="historyTable"></div>
    </section>
    <section id="year-content" class="view-panel" style="display:none;">
        <div class="content-heading">
            <span class="section-label">MODE 04</span>
            <h2 class="flex-title">年份对比</h2>
        </div>
        <div class="flex-container-options">
            <select class="selector" id="yearOnlyList" name="yearOnlyList"></select>
            <button class="selector primary-action" id="yearGo">分析</button>
        </div>
        <div class="flex-container-table" id="yearTable"></div>
    </section>
    <section id="race-content" class="view-panel" style="display: none;">
        <div class="content-heading">
            <span class="section-label">MODE 02</span>
            <h2 class="flex-title">正赛对比</h2>
        </div>
        <div class="flex-container-options">
            <select class="selector" id="raceSeasonList" name="raceSeasonList"></select>
            <select class="selector" id="raceConstructorList" name="raceConstructorList"></select>
            <select class="selector" id="raceStartRound" name="raceStartRound"></select>
            <select class="selector" id="raceEndRound" name="raceEndRound"></select>
            <select class="selector" id="raceThreshold" title="过滤掉慢于该百分比的圈速；正赛推荐 115%+（107% 是排位赛规则，会过滤掉绝大部分正赛圈）">
                <option value="none">No Filter</option>
                <option value="1.07">107%</option>
                <option value="1.10">110%</option>
                <option value="1.15" selected>115%</option>
                <option value="1.20">120%</option>
                <option value="1.25">125%</option>
                <option value="1.30">130%</option>
            </select>
            <span class="race-filter-note">
                正赛建议 115%+
            </span>
            <label class="selector" style="display:flex;align-items:center;gap:6px;">
                <input type="checkbox" id="raceExcludePit" checked>
                排除进站圈/出站圈
            </label>
            <button class="selector primary-action" id="raceGo">分析</button>
        </div>
        <div class="flex-container-table" id="raceTables"></div>
        <div class="race-note-shell">
            <div class="loading-text" id="raceApiExplain">
                数据源：Jolpica / Ergast。圈速使用单车手分站 laps 端点，进站过滤使用 pitstops 端点；阈值默认 115%。
            </div>
        </div>
    </section>
    
    <!-- Partial data notice banner for long history fetches -->
    <div id="partialNotice" class="partial-notice" style="display:none;">
        <span id="partialNoticeMsg">部分数据由于网络/CORS/限流未能获取完整。</span>
        <button id="partialResumeBtn" class="selector">继续获取</button>
    </div>
    <script>
        // 所有 tab 切换走同一个函数，统一隐藏全部面板再显示目标，避免上一个面板残留
        const TAB_PANELS = {
            qualifying: 'qualifying-content',
            race:       'race-content',
            history:    'history-content',
            year:       'year-content'
        };
        function switchTab(tab) {
            // 1. 隐藏所有面板
            Object.values(TAB_PANELS).forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.display = 'none';
            });
            // 2. 显示目标面板
            const targetId = TAB_PANELS[tab];
            if (targetId) {
                const targetEl = document.getElementById(targetId);
                if (targetEl) targetEl.style.display = 'block';
            }
            // 3. 更新按钮高亮
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.querySelector(`.tab-button[data-tab="${tab}"]`)?.classList.add('active');
            document.querySelectorAll('.view-panel').forEach(panel => panel.classList.remove('active-panel'));
            if (targetId) document.getElementById(targetId)?.classList.add('active-panel');
            // 4. 触发对应 tab 的延迟初始化（首次进入时）
            if (tab === 'history' && typeof window.initHistoryTabFromSwitch === 'function') {
                window.initHistoryTabFromSwitch();
            } else if (tab === 'race' && typeof window.initRaceTabFromSwitch === 'function') {
                window.initRaceTabFromSwitch();
            } else if (tab === 'year' && typeof window.initYearTabFromSwitch === 'function') {
                window.initYearTabFromSwitch();
            }
        }
        // 兼容旧调用：之前历史/赛/年份代码里挂在 window 上的 switchTab* 也走同一份逻辑
        window.switchTabHistory = switchTab;
        window.switchTabRace    = switchTab;
        window.switchTabYear    = switchTab;
    </script>
    
    <!-- Cache controls moved to the very bottom and centered -->
        </main>
        <footer class="app-footer">
            <div class="flex-container" id="cache-controls" style="justify-content:center;padding:16px 0;gap:8px;">
                <button class="selector" id="clearCacheBtn" title="清除已缓存的数据，强制下次请求重新获取">清空缓存</button>
                <span id="clearCacheStatus" class="loading-text" style="display:none;">已清空</span>
            </div>
        </footer>
    </div>
</body>
</html>
